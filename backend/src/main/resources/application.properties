# Application
quarkus.application.name=ticket-service
quarkus.application.version=1.0.0

# =============================================================================
# HTTP
# =============================================================================
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,Accept
quarkus.http.cors.exposed-headers=Content-Disposition

# CORS - Dev (Angular dev server)
%dev.quarkus.http.cors.origins=http://localhost:4200,http://localhost:8080

# CORS - Prod (via env var, bijv. https://tickets.example.com)
%prod.quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:80,http://localhost}

# =============================================================================
# Database - Dev (H2 in-memory)
# =============================================================================
%dev.quarkus.datasource.db-kind=h2
%dev.quarkus.datasource.jdbc.url=jdbc:h2:mem:ticketdb;DB_CLOSE_DELAY=-1
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.log.sql=true

# =============================================================================
# Database - Test (H2 in-memory)
# =============================================================================
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:ticketdb_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create

# =============================================================================
# Database - Production (PostgreSQL)
# =============================================================================
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME:ticketservice}
%prod.quarkus.datasource.password=${DB_PASSWORD:ticketservice}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticketservice}
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.datasource.jdbc.min-size=2
%prod.quarkus.datasource.jdbc.max-size=10

# =============================================================================
# Business Logic
# =============================================================================
# Reservation timeout in minutes
ticket.reservation.timeout-minutes=10
# Max tickets per order
ticket.order.max-tickets=10

# =============================================================================
# OpenAPI / Swagger
# =============================================================================
quarkus.smallrye-openapi.path=/api/openapi
quarkus.swagger-ui.path=/api/swagger-ui
%dev.quarkus.swagger-ui.always-include=true
%test.quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.always-include=false

# =============================================================================
# Health
# =============================================================================
quarkus.smallrye-health.root-path=/api/health

# =============================================================================
# Container Image (for OpenShift/AWS)
# =============================================================================
quarkus.container-image.group=ticketservice
quarkus.container-image.name=ticket-service-backend
quarkus.container-image.tag=${quarkus.application.version}

# =============================================================================
# OpenShift
# =============================================================================
quarkus.openshift.route.expose=true
quarkus.openshift.deployment-kind=Deployment
quarkus.openshift.replicas=2
quarkus.openshift.resources.requests.memory=256Mi
quarkus.openshift.resources.requests.cpu=250m
quarkus.openshift.resources.limits.memory=512Mi
quarkus.openshift.resources.limits.cpu=500m

# =============================================================================
# Mail
# =============================================================================
quarkus.mailer.from=${MAIL_FROM:noreply@ticketservice.nl}
quarkus.mailer.host=${MAIL_HOST:smtp.example.com}
quarkus.mailer.port=${MAIL_PORT:465}
quarkus.mailer.ssl=${MAIL_SSL:true}
quarkus.mailer.start-tls=${MAIL_START_TLS:DISABLED}
quarkus.mailer.username=${MAIL_USERNAME:}
quarkus.mailer.password=${MAIL_PASSWORD:}
quarkus.mailer.auth-methods=${MAIL_AUTH_METHODS:LOGIN PLAIN}

# Dynamic sender per customer (e.g. testbedrijf@tickets.lockitree.com)
ticket.mail.domain=${MAIL_TICKET_DOMAIN:tickets.lockitree.com}
ticket.mail.fallback-from=${MAIL_FROM:noreply@tickets.lockitree.com}

# Mail - Dev (mock mailer, logs naar console)
%dev.quarkus.mailer.mock=true
# Mail - Test
%test.quarkus.mailer.mock=true

# =============================================================================
# Security - QR Code signing
# =============================================================================
ticket.qr.secret=${QR_SECRET:default-dev-secret-change-in-production}

# =============================================================================
# Security - Authentication (admin, scanner, user tokens)
# =============================================================================
ticket.auth.secret=${AUTH_SECRET:default-auth-secret-change-in-production}
ticket.auth.token-expiry-hours=${AUTH_TOKEN_EXPIRY_HOURS:24}

# Base URL for links in emails (e.g. invite links)
ticket.app.base-url=${APP_BASE_URL:http://localhost:80}

# =============================================================================
# Logging
# =============================================================================
quarkus.log.level=INFO
%dev.quarkus.log.level=DEBUG
%prod.quarkus.log.category."nl.ticketservice".level=INFO
%prod.quarkus.log.console.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] %s%e%n
